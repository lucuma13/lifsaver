---
name: CI
run-name: CI - ${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      macos-runners:
        description: JSON array of the macOS runner labels CI install-tests on
        value: ${{ jobs.macos-runners.outputs.labels }}
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  # JOB 1: Lint (swift-format for style, SwiftLint for static analysis)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # The ubuntu runner image ships no Swift toolchain; the official Swift 6
    # image provides `swift format` (bundled with the toolchain since 6.0).
    container:
      image: swift:6.1
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run swift-format lint
        run: swift format lint --strict --recursive Sources Tests Package.swift
      - name: Install SwiftLint
        env:
          SWIFTLINT_VERSION: 0.65.0
          SWIFTLINT_SHA256: 79306a34e5c7cc55a220cd108cbb861dcad5f10138dcdf261e2624ae8b0a486b
        run: |
          apt-get update -q && apt-get install -qy --no-install-recommends curl unzip ca-certificates
          curl -fsSL -o swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux_amd64.zip"
          echo "${SWIFTLINT_SHA256}  swiftlint.zip" | sha256sum -c -
          unzip -q -o swiftlint.zip -d "$RUNNER_TEMP/swiftlint"
          chmod +x "$RUNNER_TEMP/swiftlint/swiftlint"
          echo "$RUNNER_TEMP/swiftlint" >> "$GITHUB_PATH"
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
  # JOB 2: Security and correctness audit (runs in parallel with lint)
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # YAML correctness
      - name: Lint YAML (yamllint)
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          config_data: "{extends: default, rules: {line-length: {max: 120, level: warning}, comments: {min-spaces-from-content: 1}}}"
      # GitHub workflow schema validation
      - name: Validate GitHub workflow schemas
        uses: dsanders11/json-schema-validate-action@eddf079f55830cc9a916a3c512ba9086240d2fea # v2.0.0
        with:
          schema: https://json.schemastore.org/github-workflow.json
          files: .github/workflows/**.yml
      # CI workflow security audit
      - name: Audit CI workflows (zizmor)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
  # JOB 3: Build and test
  test:
    name: Build & test (macOS)
    needs: [lint, audit]
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Show toolchain
        run: swift --version
      - name: Build and run test suite
        run: swift test --enable-code-coverage
      - name: Export coverage (LCOV)
        run: |
          BIN=$(swift build --show-bin-path)
          xcrun llvm-cov export \
            -format=lcov \
            -instr-profile "$BIN/codecov/default.profdata" \
            "$BIN/lifsaverPackageTests.xctest/Contents/MacOS/lifsaverPackageTests" \
            -ignore-filename-regex='(Tests|\.build)/' > coverage.lcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.lcov
          fail_ci_if_error: false
      # Type-aware analyzer rules (unused_import, unused_declaration, …) need
      # the compilation database scripts/lint/analyze.sh derives from the debug
      # build the test step just produced. Same SwiftLint version as the lint
      # job, macOS binary.
      - name: Run SwiftLint analyzer rules
        env:
          SWIFTLINT_VERSION: 0.65.0
          SWIFTLINT_SHA256: d6cb0aa7a2f5f1ef306fc9e37bcb54dc9a26facc8f7784ac0c3dd3eccf5c6ba6
        run: |
          curl -fsSL -o portable_swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          echo "${SWIFTLINT_SHA256}  portable_swiftlint.zip" | shasum -a 256 -c -
          unzip -q -o portable_swiftlint.zip -d "$RUNNER_TEMP/swiftlint"
          chmod +x "$RUNNER_TEMP/swiftlint/swiftlint"
          PATH="$RUNNER_TEMP/swiftlint:$PATH" ./scripts/lint/analyze.sh
      - name: Build universal release binaries
        run: ./scripts/release/build.sh
      - name: Assemble and verify app bundle
        run: |
          ./scripts/release/bundle_app.sh
          plutil -lint dist/Lifsaver.app/Contents/Info.plist
          test -x dist/Lifsaver.app/Contents/MacOS/Lifsaver
      - name: Package installer
        run: ./scripts/release/make_pkg.sh
      - name: Upload installer for per-OS install tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-pkg
          path: dist/lifsaver_installer_macos.pkg
          if-no-files-found: error
          retention-days: 7
  # JOB 4: Single source of truth for the macOS install-test matrix. Also
  # consumed by publish.yml's verify-brew-install.
  macos-runners:
    name: macOS runner labels
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      labels: ${{ steps.list.outputs.labels }}
    steps:
      - name: Emit label list
        id: list
        run: echo 'labels=["macos-15", "macos-15-intel", "macos-latest"]' >> "$GITHUB_OUTPUT"
  # JOB 5: Install the pkg and launch the app on every supported macOS line
  install-test:
    name: Install & launch (${{ matrix.os }})
    needs: [test, macos-runners]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.macos-runners.outputs.labels) }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Download installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: installer-pkg
          path: dist
      - name: Install pkg
        run: sudo installer -pkg dist/lifsaver_installer_macos.pkg -target /
      - name: Verify installed layout, signature, and version
        run: |
          echo "→ $(sw_vers -productVersion) $(uname -m)"
          test -d /Applications/Lifsaver.app
          /usr/bin/codesign --verify --strict /Applications/Lifsaver.app
          VERSION="$(./scripts/version.sh)"
          INSTALLED="$(plutil -extract CFBundleShortVersionString raw /Applications/Lifsaver.app/Contents/Info.plist)"
          if [ "$INSTALLED" != "$VERSION" ]; then
            echo "ERROR: installed app reports $INSTALLED, expected $VERSION" >&2
            exit 1
          fi
      - name: Launch app and verify it stays up
        run: |
          open /Applications/Lifsaver.app
          sleep 5
          pgrep -x Lifsaver
          pkill -x Lifsaver
