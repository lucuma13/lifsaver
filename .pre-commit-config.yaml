---
repos:
  # Pre-commit configuration checks
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
        exclude: \.md$
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
  # Spellcheck
  - repo: https://github.com/crate-ci/typos
    rev: v1.48.0
    hooks:
      - id: typos
        args: [--force-exclude] # Flag only: removed default --write-changes
  # YAML formatter
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        args: ["-formatter", "include_document_start=true,line_length=120"]
  # YAML linter
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - --config-data
          - "{extends: default, rules: {line-length: {max: 120, level: warning}, comments: {min-spaces-from-content: 1}}}"
  # GitHub workflow schema validation
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows
        args: ["--verbose"]
  # CI security auditing
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
  # Swift formatter and linter
  - repo: local
    hooks:
      - id: swift-format
        name: swift-format
        entry: swift format format --in-place --parallel
        language: system
        types: [swift]
      - id: swift-format-lint
        name: swift-format lint
        entry: swift format lint --strict --parallel
        language: system
        types: [swift]
      - id: swiftlint
        name: swiftlint
        entry: swiftlint lint --strict --quiet
        language: system
        types: [swift]
        pass_filenames: false
  # Bash formatter
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
  # Bash linter
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        exclude_types: [bats]
